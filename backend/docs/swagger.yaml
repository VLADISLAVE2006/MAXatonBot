host: localhost:8080
info:
  contact: {}
  description: REST API для бота записи абитуриентов на мероприятия МИРЭА
  title: MAXatonBot API
  version: "1.0"
paths:
  /api/admin/agreement:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: PDF-файл
        in: formData
        name: file
        required: true
        type: file
      - description: Версия соглашения, например 1.1
        in: formData
        name: version
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Загрузить соглашение об обработке ПД
      tags:
      - agreement
  /api/admin/organizers:
    post:
      consumes:
      - application/json
      parameters:
      - description: Данные организатора
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AdminCreateOrganizerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Создать организатора
      tags:
      - admin
  /api/agreement/current:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AgreementResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      summary: Текущее соглашение об обработке ПД
      tags:
      - agreement
  /api/events:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.ShortEvent'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Список мероприятий
      tags:
      - events
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Название
        in: formData
        name: title
        required: true
        type: string
      - description: Краткое описание
        in: formData
        name: description
        required: true
        type: string
      - description: Полный текст
        in: formData
        name: content
        required: true
        type: string
      - description: Дата (unix timestamp)
        in: formData
        name: date
        required: true
        type: integer
      - description: 'Формат: online / offline'
        in: formData
        name: format
        required: true
        type: string
      - description: 'Тип: hackathon / olympiad / conference / openday'
        in: formData
        name: type
        required: true
        type: string
      - description: Лимит мест (0 = без лимита)
        in: formData
        name: max_slots
        type: integer
      - description: Правила отмены
        in: formData
        name: cancellation_rules
        type: string
      - description: Изображение
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.Event'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
