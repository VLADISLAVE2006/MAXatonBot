      created_by:
        type: integer
      date:
        description: unix timestamp
        type: integer
      description:
        type: string
      format:
        type: string
      id:
        type: integer
      image_url:
        type: string
      is_registered:
        type: boolean
      max_slots:
        type: integer
      registered_count:
        type: integer
      title:
        type: string
      type:
        type: string
