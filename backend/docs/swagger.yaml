          description: OK
          schema:
            $ref: '#/definitions/handlers.Event'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Мероприятие по ID
      tags:
      - events
    put:
      consumes:
      - multipart/form-data
      parameters:
      - description: ID мероприятия
        in: path
        name: id
        required: true
        type: integer
      - description: Название
        in: formData
        name: title
        required: true
        type: string
      - description: Краткое описание
        in: formData
        name: description
        required: true
        type: string
      - description: Полный текст
        in: formData
        name: content
        required: true
        type: string
      - description: Дата (unix timestamp)
        in: formData
        name: date
        required: true
        type: integer
      - description: 'Формат: online / offline'
        in: formData
        name: format
        required: true
        type: string
      - description: 'Тип: hackathon / olympiad / conference / openday'
        in: formData
        name: type
        required: true
        type: string
      - description: Лимит мест
        in: formData
        name: max_slots
        type: integer
      - description: Правила отмены
        in: formData
        name: cancellation_rules
        type: string
      - description: Новое изображение
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.Event'
        "400":
